<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PureTalent professional manpower supply landing page." />
    <title>PureTalent | Manpower Supply</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar" id="top">
        <a class="brand" href="#top" aria-label="PureTalent">
          <img src="assets/logo-placeholder.svg" alt="PureTalent logo" class="brand-logo" />
        </a>

        <nav class="desktop-nav" aria-label="Main navigation">
          <a href="#about" data-i18n="nav.about"></a>
          <a href="#vision" data-i18n="nav.vision"></a>
          <a href="#services" data-i18n="nav.services"></a>
          <a href="#clients" data-i18n="nav.clients"></a>
          <a href="#careers" data-i18n="nav.careers"></a>
        </nav>

        <div class="header-actions">
          <select class="language-select" id="languageSelect" aria-label="Language">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="ta">தமிழ்</option>
            <option value="ne">नेपाली</option>
            <option value="si">සිංහල</option>
          </select>
          <button class="menu-orbit" id="menuToggle" type="button" aria-label="Open menu" aria-expanded="false">
            <span></span><span></span><span></span><span></span>
          </button>
        </div>
      </header>

      <div class="mobile-panel" id="mobilePanel" aria-hidden="true">
        <a href="#about" data-i18n="nav.about"></a>
        <a href="#ceo" data-i18n="nav.ceo"></a>
        <a href="#vision" data-i18n="nav.vision"></a>
        <a href="#services" data-i18n="nav.services"></a>
        <a href="#clients" data-i18n="nav.clients"></a>
        <a href="#organization" data-i18n="nav.organization"></a>
        <a href="#careers" data-i18n="nav.careers"></a>
      </div>

      <main>
        <section class="hero">
          <div class="hero-media" aria-hidden="true">
            <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?auto=format&fit=crop&w=1800&q=80" alt="" />
          </div>
          <div class="hero-overlay"></div>
          <div class="hero-content reveal">
            <p class="eyebrow" data-i18n="hero.eyebrow"></p>
            <h1 data-i18n="hero.title"></h1>
            <p class="hero-copy" data-i18n="hero.copy"></p>
            <div class="hero-actions">
              <a class="primary-btn" href="#careers" data-i18n="hero.apply"></a>
              <a class="ghost-btn" href="#services" data-i18n="hero.explore"></a>
            </div>
          </div>
          <div class="stats-band reveal">
            <div class="stat">
              <span class="stat-number" data-count="2019">0</span>
              <span data-i18n="stats.founded"></span>
            </div>
            <div class="stat">
              <span class="stat-number" data-count="1200">0</span>
              <span data-i18n="stats.workers"></span>
            </div>
            <div class="stat">
              <span class="stat-number" data-count="38">0</span>
              <span data-i18n="stats.clients"></span>
            </div>
            <div class="stat">
              <span class="stat-number" data-count="24">0</span>
              <span data-i18n="stats.support"></span>
            </div>
          </div>
        </section>

        <section class="section split" id="about">
          <div class="section-copy reveal">
            <p class="section-kicker" data-i18n="about.kicker"></p>
            <h2 data-i18n="about.title"></h2>
            <p data-i18n="about.copy"></p>
          </div>
          <div class="image-stack reveal">
            <img class="main-photo" src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=1100&q=80" alt="Professional workforce planning meeting" />
            <div class="mini-panel">
              <strong data-i18n="about.badgeTitle"></strong>
              <span data-i18n="about.badgeCopy"></span>
            </div>
          </div>
        </section>

        <section class="section ceo-section" id="ceo">
          <div class="ceo-photo reveal">
            <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=900&q=80" alt="CEO portrait placeholder" />
          </div>
          <div class="ceo-message reveal">
            <p class="section-kicker" data-i18n="ceo.kicker"></p>
            <h2 data-i18n="ceo.title"></h2>
            <blockquote data-i18n="ceo.quote"></blockquote>
            <p class="signature" data-i18n="ceo.name"></p>
          </div>
        </section>

        <section class="section vision-grid" id="vision">
          <article class="vision-card reveal">
            <span class="icon-mark">01</span>
            <h2 data-i18n="vision.title"></h2>
            <p data-i18n="vision.copy"></p>
          </article>
          <article class="vision-card reveal">
            <span class="icon-mark">02</span>
            <h2 data-i18n="mission.title"></h2>
            <p data-i18n="mission.copy"></p>
          </article>
        </section>

        <section class="section services" id="services">
          <div class="section-head reveal">
            <p class="section-kicker" data-i18n="services.kicker"></p>
            <h2 data-i18n="services.title"></h2>
          </div>
          <div class="service-grid">
            <article class="service-card reveal">
              <img src="https://images.unsplash.com/photo-1581092160607-ee22621dd758?auto=format&fit=crop&w=900&q=80" alt="Industrial workforce" />
              <h3 data-i18n="services.items.0.title"></h3>
              <p data-i18n="services.items.0.copy"></p>
            </article>
            <article class="service-card reveal">
              <img src="https://images.unsplash.com/photo-1560472355-536de3962603?auto=format&fit=crop&w=900&q=80" alt="Hospitality service staff" />
              <h3 data-i18n="services.items.1.title"></h3>
              <p data-i18n="services.items.1.copy"></p>
            </article>
            <article class="service-card reveal">
              <img src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=900&q=80" alt="Administrative team" />
              <h3 data-i18n="services.items.2.title"></h3>
              <p data-i18n="services.items.2.copy"></p>
            </article>
          </div>
        </section>

        <section class="section clients" id="clients">
          <div class="section-head reveal">
            <p class="section-kicker" data-i18n="clients.kicker"></p>
            <h2 data-i18n="clients.title"></h2>
          </div>
          <div class="client-grid" id="clientGrid"></div>
        </section>

        <section class="section org-section" id="organization">
          <div class="section-head reveal">
            <p class="section-kicker" data-i18n="org.kicker"></p>
            <h2 data-i18n="org.title"></h2>
          </div>
          <div class="org-chart reveal">
            <div class="org-level ceo-level">
              <div class="person-card">
                <span data-i18n="org.ceo.role"></span>
                <strong data-i18n="org.ceo.name"></strong>
              </div>
            </div>
            <div class="org-level leaders">
              <div class="person-card"><span data-i18n="org.level2.0.role"></span><strong data-i18n="org.level2.0.name"></strong></div>
              <div class="person-card"><span data-i18n="org.level2.1.role"></span><strong data-i18n="org.level2.1.name"></strong></div>
              <div class="person-card"><span data-i18n="org.level2.2.role"></span><strong data-i18n="org.level2.2.name"></strong></div>
              <div class="person-card"><span data-i18n="org.level2.3.role"></span><strong data-i18n="org.level2.3.name"></strong></div>
            </div>
            <div class="org-level teams">
              <div class="person-card small"><span data-i18n="org.level3.0"></span></div>
              <div class="person-card small"><span data-i18n="org.level3.1"></span></div>
              <div class="person-card small"><span data-i18n="org.level3.2"></span></div>
              <div class="person-card small"><span data-i18n="org.level3.3"></span></div>
              <div class="person-card small"><span data-i18n="org.level3.4"></span></div>
              <div class="person-card small"><span data-i18n="org.level3.5"></span></div>
              <div class="person-card small"><span data-i18n="org.level3.6"></span></div>
              <div class="person-card small"><span data-i18n="org.level3.7"></span></div>
            </div>
          </div>
        </section>

        <section class="section careers" id="careers">
          <div class="career-copy reveal">
            <p class="section-kicker" data-i18n="careers.kicker"></p>
            <h2 data-i18n="careers.title"></h2>
            <p data-i18n="careers.copy"></p>
            <div class="contact-line">
              <span data-i18n="contact.phoneLabel"></span>
              <a href="tel:+97126660935">02 666 0935</a>
            </div>
          </div>
          <form class="application-form reveal" id="applicationForm">
            <label>
              <span data-i18n="form.name"></span>
              <input type="text" id="applicantName" required autocomplete="name" />
            </label>
            <label>
              <span data-i18n="form.email"></span>
              <input type="email" id="applicantEmail" required autocomplete="email" />
            </label>
            <label>
              <span data-i18n="form.phone"></span>
              <input type="tel" id="applicantPhone" required autocomplete="tel" />
            </label>
            <label>
              <span data-i18n="form.position"></span>
              <input type="text" id="applicantPosition" required />
            </label>
            <label class="full">
              <span data-i18n="form.message"></span>
              <textarea id="applicantMessage" rows="4"></textarea>
            </label>
            <label class="file-label full">
              <span data-i18n="form.cv"></span>
              <input type="file" id="applicantCv" accept=".pdf,.doc,.docx" required />
              <small data-i18n="form.cvNote"></small>
            </label>
            <button class="primary-btn full" type="submit" data-i18n="form.submit"></button>
            <p class="form-note full" id="formNote" data-i18n="form.note"></p>
          </form>
        </section>
      </main>

      <footer class="footer">
        <img src="assets/logo-placeholder.svg" alt="PureTalent logo" />
        <div>
          <strong>PureTalent</strong>
          <p data-i18n="footer.copy"></p>
        </div>
        <a href="mailto:ifo@puretalent.ae">ifo@puretalent.ae</a>
      </footer>
    </div>

    <dialog class="client-modal" id="clientModal">
      <button class="modal-close" id="modalClose" type="button" aria-label="Close">×</button>
      <div class="modal-logo" id="modalLogo"></div>
      <h3 id="modalTitle"></h3>
      <p id="modalBody"></p>
      <dl>
        <div><dt data-i18n="modal.sector"></dt><dd id="modalSector"></dd></div>
        <div><dt data-i18n="modal.scope"></dt><dd id="modalScope"></dd></div>
      </dl>
    </dialog>

    <section class="chatbot-widget" id="chatbotWidget" aria-label="PureTalent assistant">
      <button class="chatbot-launcher" id="chatbotLauncher" type="button" aria-expanded="false">
        <span class="chatbot-launcher-mark">PT</span>
        <span class="chatbot-launcher-text" data-chat="launcher"></span>
      </button>

      <div class="chatbot-panel" id="chatbotPanel" aria-hidden="true">
        <div class="chatbot-head">
          <div class="chatbot-identity">
            <span class="chatbot-avatar">PT</span>
            <div>
              <strong data-chat="title"></strong>
              <small data-chat="status"></small>
            </div>
          </div>
          <button class="chatbot-close" id="chatbotClose" type="button" aria-label="Close chat">×</button>
        </div>

        <div class="chatbot-messages" id="chatbotMessages"></div>
        <div class="chatbot-suggestions" id="chatbotSuggestions"></div>

        <form class="chatbot-form" id="chatbotForm">
          <input id="chatbotInput" type="text" autocomplete="off" data-chat-placeholder="placeholder" />
          <button type="submit" data-chat="send"></button>
        </form>
      </div>
    </section>

    <script src="js/chatbot-knowledge.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
